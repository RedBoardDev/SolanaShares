version: '3.8'

services:
  solana-pnl-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: solana-pnl-bot
    restart: unless-stopped
    
    # Variables d'environnement
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/pool.db
      
      # Variables à configurer (vous pouvez les mettre dans un .env)
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - HOT_WALLET_ADDRESS=${HOT_WALLET_ADDRESS}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - MONTHLY_COST_USD=${MONTHLY_COST_USD:-40}
    
    # Volume pour persister la base de données
    volumes:
      - bot_data:/app/data
    
    # Limites de ressources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Bot is running')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Volume nommé pour la persistance des données
volumes:
  bot_data:
    driver: local